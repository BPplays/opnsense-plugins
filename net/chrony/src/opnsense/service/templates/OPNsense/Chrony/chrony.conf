{% if helpers.exists('OPNsense.chrony.general.enabled') and OPNsense.chrony.general.enabled == '1' %}

port {{ OPNsense.chrony.general.port }}
driftfile /var/db/chrony/drift
pidfile /var/run/chrony/chronyd.pid
makestep 1 3

{%   if helpers.exists('OPNsense.chrony.general.ntsclient') and OPNsense.chrony.general.ntsclient == '1' %}
ntsdumpdir /var/lib/chrony
ntstrustedcerts /usr/local/etc/ssl/cert.pem
nosystemcert
{%   endif %}

{%   if helpers.exists('OPNsense.chrony.general.ntsnocert') and OPNsense.chrony.general.ntsnocert == '1' %}
nocerttimecheck 1
{%   endif %}

{%   if not helpers.empty('OPNsense.chrony.server') %}
{%     for s in OPNsense.chrony.server %}
{{ s.type }} {{ s.hostname }} {% if s.burst_mode != 'none' %}{{ s.burst_mode }}{% endif %} {% if s.minpoll %}minpoll {{ s.minpoll }}{% endif %} {% if s.maxpoll %}maxpoll {{ s.maxpoll }}{% endif %} {% if s.prefer %}prefer{% endif %} {% if s.noselect %}noselect{% endif %} {% if s.trust %}trust{% endif %} {% if s.require %}require{% endif %} {% if s.port %}port {{ s.port }}{% endif %} {% if s.version %}version {{ s.version }}{% endif %} {% if s.offset %}offset {{ s.offset }}{% endif %} {% if s.presend %}presend {{ s.presend }}{% endif %} {% if s.minsamples %}minsamples {{ s.minsamples }}{% endif %} {% if s.maxsamples %}maxsamples {{ s.maxsamples }}{% endif %} {% if s.filter %}filter {{ s.filter }}{% endif %} {% if s.minstratum %}minstratum {{ s.minstratum }}{% endif %} {% if s.type == 'pool' and s.maxsources %}maxsources {{ s.maxsources }}{% endif %} {% if helpers.exists('OPNsense.chrony.general.ntsclient') and OPNsense.chrony.general.ntsclient == '1' %}nts{% endif %}
{%     endfor %}
{%   endif %}

{%   if not helpers.empty('OPNsense.chrony.general.allowednetworks') %}
{%     for network in OPNsense.chrony.general.allowednetworks.split(',') %}
allow {{ network }}
{%     endfor %}
{%   endif %}

{% endif %}
